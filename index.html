<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.chart-box{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:12px;
}

th{
background:#f0f0f0;
}

input{
padding:10px;
width:300px;
}
</style>

</head>

<body>

<h1>Inventory Dashboard</h1>

<div class="cards">
<div class="card">
<h2 id="totalAssets">0</h2>
Total Assets
</div>

<div class="card">
<h2 id="assignedAssets">0</h2>
Assigned
</div>

<div class="card">
<h2 id="instockAssets">0</h2>
In Stock
</div>

<div class="card">
<h2 id="disposedAssets">0</h2>
Disposed
</div>
</div>

<input type="text" id="searchBox" placeholder="Search Asset...">

<div class="chart-box">
<canvas id="statusChart"></canvas>
</div>

<table id="inventoryTable">
<thead></thead>
<tbody></tbody>
</table>

<script src="dashboard.js"></script>

</body>
</html>
