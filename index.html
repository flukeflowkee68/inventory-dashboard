<!DOCTYPE html>
<html>
<head>
    <title>Inventory Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body{
            font-family: Arial, sans-serif;
            padding:20px;
        }
        .card{
            width:300px;
            padding:20px;
            border-radius:10px;
            background:#f4f4f4;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<h1>Inventory Dashboard</h1>

<div class="card">
    <h2 id="totalAssets">0</h2>
    <p>Total Assets</p>
</div>

<canvas id="statusChart"></canvas>

<script>

const inventoryData = [
    {status:"Assigned"},
    {status:"Assigned"},
    {status:"In stock"},
    {status:"Disposed"},
    {status:"In stock"}
];

document.getElementById("totalAssets").innerText =
inventoryData.length;

const counts = {};

inventoryData.forEach(item=>{
    counts[item.status] =
    (counts[item.status] || 0) + 1;
});

new Chart(
document.getElementById('statusChart'),
{
    type:'bar',
    data:{
        labels:Object.keys(counts),
        datasets:[{
            label:'Assets by Status',
            data:Object.values(counts)
        }]
    }
});
</script>

</body>
</html>
